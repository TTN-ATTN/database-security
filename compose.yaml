name: database-security

networks:
  dbsec_net:
    driver: bridge

volumes:
  mysql_data:
  prometheus_data:
  grafana_data:
  acra_keys:

services:
  mysql:
    image: mysql:8.4
    container_name: dbsec-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_APP_USER}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
    command:
      - mysqld
      - --bind-address=0.0.0.0
      - --performance-schema=ON
      - --skip-name-resolve
      - --local-infile=0
      - --max-connections=200
      # Phase 3 - Active Monitor
      - --general-log=ON
      - --general-log-file=/var/log/mysql/general.log
      - --slow-query-log=ON
      - --slow-query-log-file=/var/log/mysql/slow.log
      - --long-query-time=0.5
      - --log-output=FILE
      # Phase 4 - enable native password so ProxySQL can auth against the backend.
      - --mysql-native-password=ON
    ports:
      - "127.0.0.1:${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./logs/mysql:/var/log/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ./mysql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./mysql/masking.sql:/docker-entrypoint-initdb.d/02-masking.sql:ro
      - ./mysql/rbac.sql:/docker-entrypoint-initdb.d/03-rbac.sql:ro
      - ./mysql/proxysql-users.sql:/docker-entrypoint-initdb.d/04-proxysql-users.sql:ro
      - ./mysql/phase4_encryption_demo.sql:/docker-entrypoint-initdb.d/05-phase4-encryption-demo.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - dbsec_net

  # Phase 4 - Database Firewall (main demo path). Client -> ProxySQL -> MySQL.
  proxysql:
    image: proxysql/proxysql:2.7.1
    container_name: dbsec-proxysql
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./config/proxysql/proxysql.cnf:/etc/proxysql.cnf:ro
    ports:
      - "127.0.0.1:${PROXYSQL_CLIENT_HOST_PORT:-6033}:6033"
      - "127.0.0.1:${PROXYSQL_ADMIN_HOST_PORT:-6032}:6032"
    networks:
      - dbsec_net

  # Phase 4 - Acra transparent encryption (evaluation path). Client -> acra-server -> MySQL.
  # Behind the 'acra' profile so the default stack does not start it (it requires
  # ACRA_MASTER_KEY, generated by scripts/phase4_acra_keys.sh). Start with:
  #   docker compose --profile acra up -d acra-server
  acra-server:
    image: cossacklabs/acra-server:0.96.0
    container_name: dbsec-acra-server
    restart: unless-stopped
    profiles: ["acra"]
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ACRA_MASTER_KEY: ${ACRA_MASTER_KEY:-}
    # Image entrypoint is already 'acra-server', so pass only flags here.
    command:
      - --db_host=dbsec-mysql
      - --db_port=3306
      - --mysql_enable
      - --incoming_connection_string=tcp://0.0.0.0:9393
      - --keys_dir=/keys
      - --client_id=dbsec_client
      - --encryptor_config_file=/configs/encryptor_config.yaml
      - --tls_client_id_from_cert=false
      # update from phase 4: emit an audit log so acra-server can act as a Phase 3
      # Active Monitor source (collected to logs/acra/acra_audit.log).
      - --audit_log_enable=true
      - -v
      - -d
    volumes:
      - acra_keys:/keys
      - ./config/acra/encryptor_config.yaml:/configs/encryptor_config.yaml:ro
    ports:
      - "127.0.0.1:${ACRA_SERVER_HOST_PORT:-9393}:9393"
    networks:
      - dbsec_net

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.19.0
    container_name: dbsec-mysqld-exporter
    restart: unless-stopped
    command:
      - --config.my-cnf=/etc/mysqld-exporter/.my.cnf
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./config/mysqld-exporter/.my.cnf:/etc/mysqld-exporter/.my.cnf:ro
    ports:
      - "127.0.0.1:${MYSQLD_EXPORTER_HOST_PORT:-9104}:9104"
    networks:
      - dbsec_net

  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: dbsec-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - mysqld-exporter
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"
    networks:
      - dbsec_net

  alertmanager:
    image: prom/alertmanager:v0.31.1
    container_name: dbsec-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:${ALERTMANAGER_HOST_PORT:-9093}:9093"
    networks:
      - dbsec_net

  grafana:
    image: grafana/grafana:12.4.1
    container_name: dbsec-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_HOST_PORT:-3000}:3000"
    networks:
      - dbsec_net
