# Phase 7 - High Availability override: 3-node MySQL Group Replication + ProxySQL
# GR-aware router.
#
# Layer this on top of compose.yaml and pull the HA services in via their profile:
#   docker compose -f compose.yaml -f compose.ha.yaml --profile ha up -d \
#       mysql-1 mysql-2 mysql-3
#   bash scripts/phase7_ha_bootstrap.sh        # forms the group + starts ha-router
#
# ROUTER NOTE: the design intent (proposal) is MySQL Router in front of an InnoDB
# Cluster. MySQL Router's automatic-failover routing needs InnoDB Cluster metadata,
# which is only created by MySQL Shell - and the MySQL Shell image is not publicly
# pullable. Per the proposal's fallback principle (4.3) we use ProxySQL configured for
# Group Replication instead: it natively tracks the primary via read_only +
# performance_schema.replication_group_members and reroutes on failover.
#
# CONFIG NOTE: all MySQL config is passed as command-line flags, NOT a mounted .cnf.
# On WSL2, files bind-mounted from the Windows filesystem are world-writable (0777),
# and MySQL silently IGNORES world-writable config files. Flags sidestep that. The GR
# group settings are identical across nodes; only server-id, report-host and the GR
# local address differ, so the flag lists are repeated per node rather than shared
# (YAML sequence anchors cannot be flattened into a list).
#
# This file ADDS services; the base single-node `mysql` keeps running for phases 1-6.
# Resource note: 3x MySQL 8.4 (~300-500MB each) + ProxySQL adds ~1-1.5GB RAM.

x-ha-node: &ha-node
  image: mysql:8.4
  profiles: ["ha"]
  restart: unless-stopped
  environment:
    MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    MYSQL_ROOT_HOST: "%"
  healthcheck:
    test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
    interval: 10s
    timeout: 5s
    retries: 20
    start_period: 40s
  networks:
    - dbsec_net

services:
  mysql-1:
    <<: *ha-node
    container_name: dbsec-mysql-1
    command:
      - mysqld
      - --server-id=1
      - --report-host=dbsec-mysql-1
      - --loose-group-replication-local-address=dbsec-mysql-1:33061
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --binlog-format=ROW
      - --log-replica-updates=ON
      - --binlog-checksum=NONE
      - --plugin-load-add=group_replication.so
      - --mysql-native-password=ON
      - --replica-parallel-workers=4
      - --replica-preserve-commit-order=ON
      - --replica-parallel-type=LOGICAL_CLOCK
      - --loose-group-replication-group-name=aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa
      - --loose-group-replication-start-on-boot=OFF
      - --loose-group-replication-bootstrap-group=OFF
      - --loose-group-replication-group-seeds=dbsec-mysql-1:33061,dbsec-mysql-2:33061,dbsec-mysql-3:33061
      - --loose-group-replication-ip-allowlist=AUTOMATIC
    volumes:
      - mysql_ha_1_data:/var/lib/mysql

  mysql-2:
    <<: *ha-node
    container_name: dbsec-mysql-2
    command:
      - mysqld
      - --server-id=2
      - --report-host=dbsec-mysql-2
      - --loose-group-replication-local-address=dbsec-mysql-2:33061
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --binlog-format=ROW
      - --log-replica-updates=ON
      - --binlog-checksum=NONE
      - --plugin-load-add=group_replication.so
      - --mysql-native-password=ON
      - --replica-parallel-workers=4
      - --replica-preserve-commit-order=ON
      - --replica-parallel-type=LOGICAL_CLOCK
      - --loose-group-replication-group-name=aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa
      - --loose-group-replication-start-on-boot=OFF
      - --loose-group-replication-bootstrap-group=OFF
      - --loose-group-replication-group-seeds=dbsec-mysql-1:33061,dbsec-mysql-2:33061,dbsec-mysql-3:33061
      - --loose-group-replication-ip-allowlist=AUTOMATIC
    volumes:
      - mysql_ha_2_data:/var/lib/mysql

  mysql-3:
    <<: *ha-node
    container_name: dbsec-mysql-3
    command:
      - mysqld
      - --server-id=3
      - --report-host=dbsec-mysql-3
      - --loose-group-replication-local-address=dbsec-mysql-3:33061
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --binlog-format=ROW
      - --log-replica-updates=ON
      - --binlog-checksum=NONE
      - --plugin-load-add=group_replication.so
      - --mysql-native-password=ON
      - --replica-parallel-workers=4
      - --replica-preserve-commit-order=ON
      - --replica-parallel-type=LOGICAL_CLOCK
      - --loose-group-replication-group-name=aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa
      - --loose-group-replication-start-on-boot=OFF
      - --loose-group-replication-bootstrap-group=OFF
      - --loose-group-replication-group-seeds=dbsec-mysql-1:33061,dbsec-mysql-2:33061,dbsec-mysql-3:33061
      - --loose-group-replication-ip-allowlist=AUTOMATIC
    volumes:
      - mysql_ha_3_data:/var/lib/mysql

  # ProxySQL GR-aware router = the HA endpoint. Config (servers, GR hostgroups, users)
  # comes from proxysql-ha.cnf. Client R/W on host port 6450, admin on 6452.
  ha-router:
    image: proxysql/proxysql:2.7.1
    container_name: dbsec-ha-router
    profiles: ["ha"]
    restart: unless-stopped
    volumes:
      - ./config/proxysql/proxysql-ha.cnf:/etc/proxysql.cnf:ro
    ports:
      - "127.0.0.1:6450:6033"
      - "127.0.0.1:6452:6032"
    networks:
      - dbsec_net

volumes:
  mysql_ha_1_data:
  mysql_ha_2_data:
  mysql_ha_3_data:
